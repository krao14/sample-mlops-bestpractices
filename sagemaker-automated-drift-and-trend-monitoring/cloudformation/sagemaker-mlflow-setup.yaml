AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Simplified SageMaker Domain setup for Automated Drift and Trend Monitoring.
  Creates: SageMaker Domain (PublicInternetOnly), MLflow Tracking Server,
  JupyterLab Space with repo clone, S3 bucket, and IAM execution role.

Parameters:
  ProjectName:
    Type: String
    Default: 'fraud-detection-monitoring'
    Description: 'Project name (lowercase letters, numbers, hyphens only)'
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Must contain only lowercase letters, numbers, and hyphens'

  UserProfileName:
    Type: String
    Default: 'fraud-detection-user'
    Description: Name for SageMaker user profile
    AllowedPattern: '^[a-zA-Z0-9-]+$'

  JupyterLabInstance:
    Type: String
    Default: 'ml.t3.medium'
    Description: Instance type for JupyterLab space
    AllowedValues:
      - ml.t3.medium
      - ml.t3.large
      - ml.t3.xlarge
      - ml.m5.large
      - ml.m5.xlarge

  GitHubRepo:
    Type: String
    Default: 'https://github.com/aws-samples/sample-mlops-bestpractices.git'
    Description: GitHub repository URL to clone

  UseExistingBucket:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing S3 bucket instead of creating new one'
    AllowedValues:
      - 'true'
      - 'false'

  UseExistingRole:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing IAM role instead of creating new one'
    AllowedValues:
      - 'true'
      - 'false'

  UseExistingVPC:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing VPC and subnets instead of creating new ones'
    AllowedValues:
      - 'true'
      - 'false'

  ExistingVPCId:
    Type: String
    Default: ''
    Description: 'Existing VPC ID (required if UseExistingVPC=true)'

  ExistingSubnet1Id:
    Type: String
    Default: ''
    Description: 'Existing Subnet 1 ID (required if UseExistingVPC=true)'

  ExistingSubnet2Id:
    Type: String
    Default: ''
    Description: 'Existing Subnet 2 ID (required if UseExistingVPC=true)'

  ExistingSecurityGroupId:
    Type: String
    Default: ''
    Description: 'Existing Security Group ID (optional if UseExistingVPC=true, will create new if empty)'

Conditions:
  CreateNewBucket: !Equals [!Ref UseExistingBucket, 'false']
  CreateNewRole: !Equals [!Ref UseExistingRole, 'false']
  CreateNewVPC: !Equals [!Ref UseExistingVPC, 'false']
  CreateNewSecurityGroup: !Or
    - !Equals [!Ref UseExistingVPC, 'false']
    - !Equals [!Ref ExistingSecurityGroupId, '']

Resources:
  # ====================================================================
  # VPC - Minimal Configuration for SageMaker (No NAT Gateway)
  # ====================================================================
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-2'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateNewSecurityGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      GroupDescription: Security group for SageMaker Domain
      VpcId: !If
        - CreateNewVPC
        - !Ref VPC
        - !Ref ExistingVPCId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-sg'

  SecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateNewSecurityGroup
    Properties:
      IpProtocol: '-1'
      GroupId: !Ref SecurityGroup
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: Allow traffic within security group

  # ====================================================================
  # Lambda Function to Wait for ENI Cleanup Before Subnet Deletion
  # ====================================================================
  WaitForENICleanupFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-wait-eni-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt WaitForENICleanupRole.Arn
      Timeout: 900  # 15 minutes max
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time

          ec2 = boto3.client('ec2')

          def try_delete_eni(eni):
              """Best-effort delete of a single ENI. Returns True if deleted."""
              eni_id = eni['NetworkInterfaceId']
              status = eni.get('Status')
              att = eni.get('Attachment') or {}
              att_id = att.get('AttachmentId')

              if att_id and status == 'in-use':
                  try:
                      ec2.detach_network_interface(AttachmentId=att_id, Force=True)
                      print(f'  Force-detached {eni_id}')
                      time.sleep(5)
                  except Exception as e:
                      print(f'  Detach {eni_id} failed: {e}')

              try:
                  ec2.delete_network_interface(NetworkInterfaceId=eni_id)
                  print(f'  Deleted ENI {eni_id}')
                  return True
              except Exception as e:
                  print(f'  Delete {eni_id} failed: {e}')
                  return False

          def handler(event, context):
              try:
                  if event['RequestType'] != 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  subnet_ids = event['ResourceProperties'].get('SubnetIds', [])
                  print(f'Cleaning ENIs in subnets: {subnet_ids}')

                  # Phase 1: polite wait — let SageMaker/EFS release ENIs naturally
                  polite_wait = 300  # 5 min
                  interval = 15
                  elapsed = 0
                  while elapsed < polite_wait:
                      all_clear = True
                      for subnet_id in subnet_ids:
                          resp = ec2.describe_network_interfaces(
                              Filters=[{'Name': 'subnet-id', 'Values': [subnet_id]}])
                          enis = resp.get('NetworkInterfaces', [])
                          if enis:
                              all_clear = False
                              print(f'  {subnet_id}: {len(enis)} ENI(s) remaining')
                      if all_clear:
                          print('✅ All ENIs released naturally')
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                          return
                      time.sleep(interval)
                      elapsed += interval

                  # Phase 2: force — delete remaining ENIs directly
                  print('Polite wait timed out, force-deleting remaining ENIs...')
                  force_wait = 420  # 7 min
                  elapsed = 0
                  while elapsed < force_wait:
                      all_clear = True
                      for subnet_id in subnet_ids:
                          resp = ec2.describe_network_interfaces(
                              Filters=[{'Name': 'subnet-id', 'Values': [subnet_id]}])
                          for eni in resp.get('NetworkInterfaces', []):
                              all_clear = False
                              try_delete_eni(eni)
                      if all_clear:
                          print('✅ All ENIs cleaned up')
                          break
                      time.sleep(interval)
                      elapsed += interval

                  # Always send SUCCESS — if ENIs still linger, subnet
                  # deletion will fail cleanly with a clear error and can
                  # be retried without the stack being stuck on this resource.
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  print(f'Error (continuing with SUCCESS): {e}')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                   {'Error': str(e)})

  WaitForENICleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-DescribeENIs'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DetachNetworkInterface
                  - ec2:DeleteNetworkInterface
                Resource: '*'

  # ====================================================================
  # Lambda Function to Clean Up EFS Filesystem Created by SageMaker Domain
  # ====================================================================
  # SageMaker Domain creates an EFS filesystem + mount targets that are
  # NOT tracked by CloudFormation. When the domain is deleted, the EFS
  # filesystem (and its mount target ENIs) persist, which blocks the
  # subnets from being deleted.
  #
  # On Delete: finds the HomeEfsFileSystemId from the domain, deletes
  # all mount targets, waits for them to clear, then deletes the EFS.
  # No-op on Create/Update.
  # ====================================================================
  EfsCleanupFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-efs-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt EfsCleanupRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time

          sm = boto3.client('sagemaker')
          efs = boto3.client('efs')

          def delete_efs(domain_id):
              try:
                  desc = sm.describe_domain(DomainId=domain_id)
                  efs_id = desc.get('HomeEfsFileSystemId')
              except Exception as e:
                  print(f'Cannot describe domain {domain_id}: {e}')
                  return

              if not efs_id:
                  print('No EFS attached to domain')
                  return

              print(f'Cleaning EFS {efs_id}')

              # Delete mount targets
              try:
                  mts = efs.describe_mount_targets(FileSystemId=efs_id).get('MountTargets', [])
                  for mt in mts:
                      try:
                          efs.delete_mount_target(MountTargetId=mt['MountTargetId'])
                          print(f"Deleted mount target {mt['MountTargetId']}")
                      except Exception as e:
                          print(f"Mount target delete error: {e}")
              except efs.exceptions.FileSystemNotFound:
                  print(f'EFS {efs_id} already gone')
                  return

              # Wait for mount targets (and their ENIs) to fully clear
              for i in range(40):
                  try:
                      remaining = efs.describe_mount_targets(FileSystemId=efs_id).get('MountTargets', [])
                  except efs.exceptions.FileSystemNotFound:
                      remaining = []
                  if not remaining:
                      print('All mount targets cleared')
                      break
                  print(f'  {len(remaining)} mount target(s) still present, waiting 15s ({i+1}/40)')
                  time.sleep(15)

              # Delete the filesystem
              try:
                  efs.delete_file_system(FileSystemId=efs_id)
                  print(f'Deleted EFS {efs_id}')
              except efs.exceptions.FileSystemNotFound:
                  print(f'EFS {efs_id} already deleted')
              except Exception as e:
                  print(f'EFS delete error: {e}')

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      domain_id = event['ResourceProperties'].get('DomainId')
                      if domain_id:
                          delete_efs(domain_id)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f'Error: {e}')
                  # Never block stack deletion
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                   {'Error': str(e)})

  EfsCleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-EfsCleanup'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:DescribeDomain
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:DeleteMountTarget
                  - elasticfilesystem:DeleteFileSystem
                  - elasticfilesystem:DescribeFileSystems
                Resource: '*'

  EfsCleanup:
    Type: Custom::EfsCleanup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn:
      - SageMakerDomain
      - UserProfile
      - JupyterSpace
      - AppCleanup
    Properties:
      ServiceToken: !GetAtt EfsCleanupFunction.Arn
      DomainId: !Ref SageMakerDomain

  WaitForENICleanup:
    Type: Custom::WaitForENICleanup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn:
      - SageMakerDomain
      - UserProfile
      - JupyterSpace
      - AppCleanup
      - EfsCleanup
    Properties:
      ServiceToken: !GetAtt WaitForENICleanupFunction.Arn
      SubnetIds:
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet1
          - !Ref ExistingSubnet1Id
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet2
          - !Ref ExistingSubnet2Id

  # ====================================================================
  # Lambda Function to Clean Up SageMaker Apps Before Space Deletion
  # ====================================================================
  # Handles a CloudFormation gap: AWS::SageMaker::App is not managed by
  # this template (apps are launched by users), but a Space cannot be
  # deleted while it has non-Deleted apps attached.
  #
  # On Create: deletes any pre-existing apps (covers the "failed app
  #   blocking stack update" recovery path).
  # On Update: uses OldResourceProperties to clean apps in the old
  #   space when the domain is being replaced.
  # On Delete: cleans apps so the space can be deleted cleanly.
  # ====================================================================
  AppCleanupFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-app-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AppCleanupRole.Arn
      Timeout: 900  # 15 minutes — app deletion can take several minutes
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time

          sm = boto3.client('sagemaker')

          def delete_apps_in_space(domain_id, space_name):
              """Delete all non-deleted apps in a space and wait for cleanup."""
              try:
                  resp = sm.list_apps(
                      DomainIdEquals=domain_id,
                      SpaceNameEquals=space_name,
                  )
                  apps = resp.get('Apps', [])
                  print(f'Found {len(apps)} app(s) in space {space_name}')

                  for app in apps:
                      status = app['Status']
                      if status == 'Deleted':
                          continue
                      try:
                          sm.delete_app(
                              DomainId=domain_id,
                              SpaceName=space_name,
                              AppType=app['AppType'],
                              AppName=app['AppName'],
                          )
                          print(f"Initiated delete for {app['AppName']} (status was {status})")
                      except sm.exceptions.ResourceInUse:
                          print(f"{app['AppName']} already being deleted")
                      except Exception as e:
                          print(f"Error deleting {app['AppName']}: {e}")

                  # Wait for apps to reach Deleted state
                  max_wait = 780  # 13 minutes (leave buffer for Lambda overhead)
                  interval = 15
                  elapsed = 0
                  while elapsed < max_wait:
                      resp = sm.list_apps(
                          DomainIdEquals=domain_id,
                          SpaceNameEquals=space_name,
                      )
                      pending = [
                          (a['AppName'], a['Status'])
                          for a in resp.get('Apps', [])
                          if a['Status'] != 'Deleted'
                      ]
                      if not pending:
                          print('✅ All apps deleted')
                          return
                      print(f'Waiting... {len(pending)} app(s) remaining: {pending}')
                      time.sleep(interval)
                      elapsed += interval

                  print(f'⚠️ Timeout after {max_wait}s, continuing anyway')
              except sm.exceptions.ClientError as e:
                  # If domain/space no longer exists, that's fine — nothing to clean
                  code = e.response.get('Error', {}).get('Code', '')
                  if code in ('ResourceNotFound', 'ValidationException'):
                      print(f'Domain/space not found (already deleted): {e}')
                      return
                  raise

          def handler(event, context):
              try:
                  request_type = event['RequestType']
                  print(f'RequestType: {request_type}')

                  if request_type == 'Create':
                      # Clean any pre-existing apps (e.g., failed apps from
                      # previous manual launches that now block stack updates)
                      props = event['ResourceProperties']
                      delete_apps_in_space(props['DomainId'], props['SpaceName'])

                  elif request_type == 'Update':
                      # If domain is being replaced, clean apps in the OLD space
                      old = event.get('OldResourceProperties', {})
                      new = event.get('ResourceProperties', {})
                      if old.get('DomainId') and old['DomainId'] != new.get('DomainId'):
                          print('Domain replacement detected, cleaning old space apps')
                          delete_apps_in_space(old['DomainId'], old['SpaceName'])

                  elif request_type == 'Delete':
                      props = event['ResourceProperties']
                      delete_apps_in_space(props['DomainId'], props['SpaceName'])

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f'Error: {e}')
                  # Never fail the stack operation on cleanup errors
                  cfnresponse.send(
                      event, context, cfnresponse.SUCCESS,
                      {'Error': str(e), 'Message': 'Error during cleanup, continuing'},
                  )

  AppCleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-AppCleanup'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:ListApps
                  - sagemaker:DeleteApp
                  - sagemaker:DescribeApp
                Resource: '*'

  AppCleanup:
    Type: Custom::AppCleanup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    # DependsOn JupyterSpace so that on stack delete/replace, this runs
    # BEFORE the space is deleted (reverse dependency order on Delete).
    DependsOn: JupyterSpace
    Properties:
      ServiceToken: !GetAtt AppCleanupFunction.Arn
      DomainId: !Ref SageMakerDomain
      SpaceName: !Sub '${ProjectName}-space'
      UserProfileName: !Ref UserProfileName

  # ====================================================================
  # Lambda Function to Empty S3 Bucket on Stack Deletion
  # ====================================================================
  EmptyS3BucketFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-empty-bucket-lambda'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt EmptyS3BucketRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          from botocore.exceptions import ClientError

          s3 = boto3.resource('s3')
          s3_client = boto3.client('s3')

          def empty_and_delete_bucket(bucket_name):
              # Check if bucket exists — if not, nothing to do
              try:
                  s3_client.head_bucket(Bucket=bucket_name)
              except ClientError as e:
                  code = e.response.get('Error', {}).get('Code', '')
                  if code in ('404', 'NoSuchBucket'):
                      print(f'Bucket {bucket_name} does not exist — skipping')
                      return
                  raise

              bucket = s3.Bucket(bucket_name)

              # Delete all object versions (for versioned buckets)
              try:
                  bucket.object_versions.delete()
              except ClientError as e:
                  print(f'object_versions.delete() error: {e}')

              # Delete any remaining current-version objects
              try:
                  bucket.objects.delete()
              except ClientError as e:
                  print(f'objects.delete() error: {e}')

              print(f'Emptied bucket: {bucket_name}')

          def handler(event, context):
              # ALWAYS send SUCCESS on Delete — cleanup failures should never
              # block stack deletion. The worst case (orphaned bucket) is
              # easy to clean up manually; a stuck stack is not.
              try:
                  bucket_name = event['ResourceProperties']['BucketName']
                  if event['RequestType'] == 'Delete':
                      print(f'Emptying bucket: {bucket_name}')
                      empty_and_delete_bucket(bucket_name)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f'Error (continuing with SUCCESS to unblock stack): {e}')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                   {'Error': str(e)})

  EmptyS3BucketRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-EmptyBucketPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}/*'

  # ====================================================================
  # S3 Bucket for Data Storage (Conditional Creation)
  # ====================================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewBucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub '${ProjectName}-data-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-data-bucket'

  EmptyS3BucketCustomResource:
    Type: Custom::EmptyS3Bucket
    Condition: CreateNewBucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ServiceToken: !GetAtt EmptyS3BucketFunction.Arn
      BucketName: !Sub '${ProjectName}-data-${AWS::AccountId}'

  # ====================================================================
  # IAM Execution Role (Conditional Creation)
  # ====================================================================
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateNewRole
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RoleName: !Sub '${ProjectName}-SageMakerExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - sagemaker.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSageMakerFullAccess'
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
        - 'arn:aws:iam::aws:policy/AmazonAthenaFullAccess'
        - 'arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess'
      Policies:
        - PolicyName: !Sub '${ProjectName}-MLflowAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Control-plane: manage the tracking-server resource itself.
              - Effect: Allow
                Action:
                  - 'sagemaker:CreateMlflowTrackingServer'
                  - 'sagemaker:UpdateMlflowTrackingServer'
                  - 'sagemaker:DeleteMlflowTrackingServer'
                  - 'sagemaker:DescribeMlflowTrackingServer'
                  - 'sagemaker:ListMlflowTrackingServers'
                  - 'sagemaker:StartMlflowTrackingServer'
                  - 'sagemaker:StopMlflowTrackingServer'
                  # Needed by the Studio console to mint the signed URL
                  # that opens the MLflow UI in a new tab.
                  - 'sagemaker:CreatePresignedMlflowTrackingServerUrl'
                Resource: '*'
              # Data-plane: open the MLflow UI and read/write experiments,
              # runs, metrics, params, tags, and registered models. This is
              # the `sagemaker-mlflow:AccessUI` action surfaced in the
              # "not authorized to perform" error, plus the REST actions
              # mlflow-client calls against the server from notebooks.
              - Effect: Allow
                Action:
                  - 'sagemaker-mlflow:*'
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:mlflow-tracking-server/*'
        - PolicyName: !Sub '${ProjectName}-EventBridgeAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:PutRule'
                  - 'events:PutTargets'
                  - 'events:DeleteRule'
                  - 'events:RemoveTargets'
                  - 'events:DescribeRule'
                Resource: '*'
        - PolicyName: !Sub '${ProjectName}-IAMPassRole'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/*'
                Condition:
                  StringEquals:
                    'iam:PassedToService': 'sagemaker.amazonaws.com'
        - PolicyName: !Sub '${ProjectName}-SageMakerImageAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sagemaker:DescribeImageVersion'
                  - 'sagemaker:DescribeImage'
                  - 'sagemaker:ListImageVersions'
                  - 'sagemaker:DescribeApp'
                  - 'sagemaker:DescribeSpace'
                  - 'sagemaker:DescribeDomain'
                  - 'sagemaker:DescribeUserProfile'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ecr:GetAuthorizationToken'
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'ecr:DescribeImages'
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-execution-role'

  # ====================================================================
  # SageMaker Domain (VpcOnly with public subnets - No NAT Gateway!)
  # ====================================================================
  SageMakerDomain:
    Type: AWS::SageMaker::Domain
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DomainName: !Sub '${ProjectName}-domain'
      AuthMode: IAM
      DefaultUserSettings:
        ExecutionRole: !If
          - CreateNewRole
          - !GetAtt SageMakerExecutionRole.Arn
          - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
        SecurityGroups:
          - !If
            - CreateNewSecurityGroup
            - !Ref SecurityGroup
            - !Ref ExistingSecurityGroupId
      AppNetworkAccessType: PublicInternetOnly
      VpcId: !If
        - CreateNewVPC
        - !Ref VPC
        - !Ref ExistingVPCId
      SubnetIds:
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet1
          - !Ref ExistingSubnet1Id
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet2
          - !Ref ExistingSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-domain'

  # ====================================================================
  # User Profile
  # ====================================================================
  UserProfile:
    Type: AWS::SageMaker::UserProfile
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn: SpaceLifecycleConfig
    Properties:
      DomainId: !Ref SageMakerDomain
      UserProfileName: !Ref UserProfileName
      UserSettings:
        ExecutionRole: !If
          - CreateNewRole
          - !GetAtt SageMakerExecutionRole.Arn
          - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
        JupyterLabAppSettings:
          LifecycleConfigArns:
            - !GetAtt SpaceLifecycleConfig.StudioLifecycleConfigArn
          DefaultResourceSpec:
            InstanceType: !Ref JupyterLabInstance
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-user-profile'

  # ====================================================================
  # Lifecycle Configuration
  # ====================================================================
  SpaceLifecycleConfig:
    Type: AWS::SageMaker::StudioLifecycleConfig
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      StudioLifecycleConfigName: !Sub '${ProjectName}-setup-script-v2'
      StudioLifecycleConfigAppType: JupyterLab
      StudioLifecycleConfigContent:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -x  # Debug mode - log all commands

            # Log function
            log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $1"
            }

            log "Starting lifecycle configuration..."

            # Wait for Jupyter to be fully ready
            sleep 10

            # Set up environment as the default notebook user
            WORK_DIR="/home/sagemaker-user"
            cd "$WORK_DIR" || exit 1

            # Clone repository if not already present
            if [ ! -d "sample-mlops-bestpractices" ]; then
              log "Cloning repository from ${GitHubRepo}..."
              if git clone ${GitHubRepo}; then
                log "Repository cloned successfully"
              else
                log "ERROR: Failed to clone repository. Exit code: $?"
                log "Checking network connectivity..."
                curl -I https://github.com || log "Cannot reach GitHub"
                exit 1
              fi
            else
              log "Repository already exists, skipping clone"
            fi

            # Navigate to project directory
            cd sample-mlops-bestpractices/sagemaker-automated-drift-and-trend-monitoring || exit 1
            log "Changed to project directory"

            # Create .env file with CloudFormation outputs
            echo "Creating .env file with CloudFormation outputs..."
            cat > .env << 'EOF'
            # AWS Configuration
            AWS_DEFAULT_REGION=${AWS::Region}

            # SageMaker Configuration
            SAGEMAKER_EXEC_ROLE=arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole
            SAGEMAKER_DOMAIN_ID=${SageMakerDomain}

            # MLflow Configuration
            MLFLOW_TRACKING_URI=${MLflowTrackingServer.TrackingServerArn}

            # S3 Configuration
            DATA_S3_BUCKET=${ProjectName}-data-${AWS::AccountId}

            # Project Configuration
            PROJECT_NAME=${ProjectName}
            EOF

            # Set proper ownership
            chown sagemaker-user:sagemaker-user .env
            chmod 600 .env

            # Create README with setup instructions
            cat > CLOUDFORMATION_SETUP_COMPLETE.md << 'SETUPEOF'
            # CloudFormation Setup Complete!

            ## Environment Variables Configured

            Your .env file has been automatically created with all necessary configurations:
            - AWS Region and SageMaker Execution Role
            - MLflow Tracking Server URL
            - S3 Data Bucket

            ## Next Steps

            1. Open a terminal and verify the environment:
               ```bash
               cat .env
               ```

            2. Install dependencies:
               ```bash
               pip install -r requirements.txt
               ```

            3. Run the notebooks in order:
               - 01_data_preparation.ipynb
               - 02_model_training.ipynb
               - 03_inference_monitoring.ipynb

            ## MLflow Tracking Server

            Your MLflow tracking server ARN:
            ${MLflowTrackingServer.TrackingServerArn}

            To get the MLflow UI URL, run:
            aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query 'TrackingServerUrl' --output text

            SETUPEOF

            chown sagemaker-user:sagemaker-user CLOUDFORMATION_SETUP_COMPLETE.md

            log "Setup complete! Check CLOUDFORMATION_SETUP_COMPLETE.md for next steps."
            exit 0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-lifecycle-config'

  # ====================================================================
  # JupyterLab Space
  # ====================================================================
  JupyterSpace:
    Type: AWS::SageMaker::Space
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn:
      - UserProfile
      - MLflowTrackingServer
      - SpaceLifecycleConfig
    Properties:
      DomainId: !Ref SageMakerDomain
      SpaceName: !Sub '${ProjectName}-space'
      OwnershipSettings:
        OwnerUserProfileName: !Ref UserProfileName
      SpaceSettings:
        AppType: JupyterLab
        JupyterLabAppSettings:
          DefaultResourceSpec:
            InstanceType: !Ref JupyterLabInstance
            LifecycleConfigArn: !GetAtt SpaceLifecycleConfig.StudioLifecycleConfigArn
      SpaceSharingSettings:
        SharingType: Private
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-jupyter-space'
        - Key: ManagedBy
          Value: CloudFormation

  # ====================================================================
  # MLflow Tracking Server
  # ====================================================================
  MLflowTrackingServer:
    Type: AWS::SageMaker::MlflowTrackingServer
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TrackingServerName: !Sub '${ProjectName}-mlflow'
      ArtifactStoreUri: !Sub 's3://${ProjectName}-data-${AWS::AccountId}/mlflow-artifacts'
      RoleArn: !If
        - CreateNewRole
        - !GetAtt SageMakerExecutionRole.Arn
        - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
      AutomaticModelRegistration: true
      WeeklyMaintenanceWindowStart: 'Sun:03:00'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-mlflow'

Outputs:
  SageMakerDomainId:
    Description: SageMaker Domain ID
    Value: !Ref SageMakerDomain
    Export:
      Name: !Sub '${AWS::StackName}-DomainId'

  UserProfileName:
    Description: SageMaker User Profile Name
    Value: !Ref UserProfileName
    Export:
      Name: !Sub '${AWS::StackName}-UserProfileName'

  JupyterSpaceName:
    Description: JupyterLab Space Name
    Value: !Sub '${ProjectName}-space'
    Export:
      Name: !Sub '${AWS::StackName}-JupyterSpaceName'

  DataBucketName:
    Description: S3 Data Bucket Name
    Value: !If [CreateNewBucket, !Ref DataBucket, !Sub '${ProjectName}-data-${AWS::AccountId}']
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  SageMakerExecutionRoleArn:
    Description: SageMaker Execution Role ARN
    Value: !If
      - CreateNewRole
      - !GetAtt SageMakerExecutionRole.Arn
      - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'

  MLflowTrackingServerArn:
    Description: MLflow Tracking Server ARN
    Value: !GetAtt MLflowTrackingServer.TrackingServerArn
    Export:
      Name: !Sub '${AWS::StackName}-MLflowArn'

  MLflowTrackingServerName:
    Description: MLflow Tracking Server Name (use with describe-mlflow-tracking-server to get URL)
    Value: !Sub '${ProjectName}-mlflow'
    Export:
      Name: !Sub '${AWS::StackName}-MLflowName'

  GetMLflowUrlCommand:
    Description: Command to get MLflow UI URL
    Value: !Sub 'aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query TrackingServerUrl --output text --region ${AWS::Region}'

  SetupInstructions:
    Description: Setup Instructions
    Value: !Sub |
      Stack created successfully!

      1. Navigate to SageMaker Console: https://console.aws.amazon.com/sagemaker/home?region=${AWS::Region}#/domains
      2. Click on Domain: ${ProjectName}-domain
      3. Select User Profile: ${UserProfileName}
      4. Go to Spaces and open: ${ProjectName}-jupyter-space
      5. Click "Run Space" to start JupyterLab
      6. Once JupyterLab loads, check CLOUDFORMATION_SETUP_COMPLETE.md for next steps

      Get MLflow UI URL:
      aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query TrackingServerUrl --output text --region ${AWS::Region}
