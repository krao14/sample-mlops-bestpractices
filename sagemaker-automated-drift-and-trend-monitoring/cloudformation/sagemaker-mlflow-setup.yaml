AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Simplified SageMaker Domain setup for Automated Drift and Trend Monitoring.
  Creates: SageMaker Domain (PublicInternetOnly), MLflow Tracking Server,
  JupyterLab Space with repo clone, S3 bucket, and IAM execution role.

Parameters:
  ProjectName:
    Type: String
    Default: 'fraud-detection-monitoring'
    Description: 'Project name (lowercase letters, numbers, hyphens only)'
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Must contain only lowercase letters, numbers, and hyphens'

  UserProfileName:
    Type: String
    Default: 'fraud-detection-user'
    Description: Name for SageMaker user profile
    AllowedPattern: '^[a-zA-Z0-9-]+$'

  JupyterLabInstance:
    Type: String
    Default: 'ml.t3.medium'
    Description: Instance type for JupyterLab space
    AllowedValues:
      - ml.t3.medium
      - ml.t3.large
      - ml.t3.xlarge
      - ml.m5.large
      - ml.m5.xlarge

  GitHubRepo:
    Type: String
    Default: 'https://github.com/aws-samples/sample-mlops-bestpractices.git'
    Description: GitHub repository URL to clone

  UseExistingBucket:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing S3 bucket instead of creating new one'
    AllowedValues:
      - 'true'
      - 'false'

  UseExistingRole:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing IAM role instead of creating new one'
    AllowedValues:
      - 'true'
      - 'false'

  UseExistingVPC:
    Type: String
    Default: 'false'
    Description: 'Set to true to use existing VPC and subnets instead of creating new ones'
    AllowedValues:
      - 'true'
      - 'false'

  ExistingVPCId:
    Type: String
    Default: ''
    Description: 'Existing VPC ID (required if UseExistingVPC=true)'

  ExistingSubnet1Id:
    Type: String
    Default: ''
    Description: 'Existing Subnet 1 ID (required if UseExistingVPC=true)'

  ExistingSubnet2Id:
    Type: String
    Default: ''
    Description: 'Existing Subnet 2 ID (required if UseExistingVPC=true)'

  ExistingSecurityGroupId:
    Type: String
    Default: ''
    Description: 'Existing Security Group ID (optional if UseExistingVPC=true, will create new if empty)'

Conditions:
  CreateNewBucket: !Equals [!Ref UseExistingBucket, 'false']
  CreateNewRole: !Equals [!Ref UseExistingRole, 'false']
  CreateNewVPC: !Equals [!Ref UseExistingVPC, 'false']
  CreateNewSecurityGroup: !Or
    - !Equals [!Ref UseExistingVPC, 'false']
    - !Equals [!Ref ExistingSecurityGroupId, '']

Resources:
  # ====================================================================
  # VPC - Minimal Configuration for SageMaker (No NAT Gateway)
  # ====================================================================
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-2'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateNewSecurityGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      GroupDescription: Security group for SageMaker Domain
      VpcId: !If
        - CreateNewVPC
        - !Ref VPC
        - !Ref ExistingVPCId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-sg'

  SecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateNewSecurityGroup
    Properties:
      IpProtocol: '-1'
      GroupId: !Ref SecurityGroup
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: Allow traffic within security group

  # ====================================================================
  # Lambda Function to Wait for ENI Cleanup Before Subnet Deletion
  # ====================================================================
  WaitForENICleanupFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-wait-eni-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt WaitForENICleanupRole.Arn
      Timeout: 900  # 15 minutes max
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import time

          ec2 = boto3.client('ec2')

          def handler(event, context):
              try:
                  subnet_ids = event['ResourceProperties'].get('SubnetIds', [])

                  if event['RequestType'] == 'Delete':
                      print(f'Waiting for ENIs to be cleaned up from subnets: {subnet_ids}')

                      max_wait = 840  # 14 minutes (leave 60s for Lambda overhead)
                      interval = 15   # Check every 15 seconds
                      elapsed = 0

                      while elapsed < max_wait:
                          all_clear = True

                          for subnet_id in subnet_ids:
                              try:
                                  response = ec2.describe_network_interfaces(
                                      Filters=[{'Name': 'subnet-id', 'Values': [subnet_id]}]
                                  )

                                  eni_count = len(response['NetworkInterfaces'])

                                  if eni_count > 0:
                                      print(f'Subnet {subnet_id} still has {eni_count} ENI(s)')
                                      all_clear = False

                                      # Log ENI details for troubleshooting
                                      for eni in response['NetworkInterfaces']:
                                          print(f"  ENI: {eni['NetworkInterfaceId']}, "
                                                f"Status: {eni['Status']}, "
                                                f"Description: {eni.get('Description', 'N/A')}")
                              except Exception as e:
                                  print(f'Error checking subnet {subnet_id}: {str(e)}')

                          if all_clear:
                              print('✅ All ENIs have been cleaned up!')
                              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                              return

                          print(f'Waiting... ({elapsed}/{max_wait} seconds)')
                          time.sleep(interval)
                          elapsed += interval

                      # Timeout reached, but don't fail - CloudFormation will retry subnet deletion
                      print(f'⚠️ Timeout reached after {max_wait} seconds, but continuing...')
                      cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                     {'Message': 'Timeout reached but proceeding'})
                  else:
                      # Create/Update - nothing to do
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  print(f'Error: {str(e)}')
                  # Don't fail the stack deletion even if Lambda fails
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                 {'Error': str(e), 'Message': 'Error occurred but continuing'})

  WaitForENICleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-DescribeENIs'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeNetworkInterfaces
                Resource: '*'

  WaitForENICleanup:
    Type: Custom::WaitForENICleanup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn:
      - SageMakerDomain
      - UserProfile
      - JupyterSpace
    Properties:
      ServiceToken: !GetAtt WaitForENICleanupFunction.Arn
      SubnetIds:
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet1
          - !Ref ExistingSubnet1Id
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet2
          - !Ref ExistingSubnet2Id

  # ====================================================================
  # Lambda Function to Empty S3 Bucket on Stack Deletion
  # ====================================================================
  EmptyS3BucketFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub '${ProjectName}-empty-bucket-lambda'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt EmptyS3BucketRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.resource('s3')

          def handler(event, context):
              try:
                  bucket_name = event['ResourceProperties']['BucketName']

                  if event['RequestType'] == 'Delete':
                      print(f'Emptying bucket: {bucket_name}')
                      bucket = s3.Bucket(bucket_name)

                      # Delete all versions and delete markers
                      bucket.object_versions.delete()

                      print(f'Successfully emptied bucket: {bucket_name}')

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f'Error: {str(e)}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  EmptyS3BucketRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-EmptyBucketPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-data-${AWS::AccountId}/*'

  # ====================================================================
  # S3 Bucket for Data Storage (Conditional Creation)
  # ====================================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewBucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub '${ProjectName}-data-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-data-bucket'

  EmptyS3BucketCustomResource:
    Type: Custom::EmptyS3Bucket
    Condition: CreateNewBucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ServiceToken: !GetAtt EmptyS3BucketFunction.Arn
      BucketName: !Sub '${ProjectName}-data-${AWS::AccountId}'

  # ====================================================================
  # IAM Execution Role (Conditional Creation)
  # ====================================================================
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateNewRole
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RoleName: !Sub '${ProjectName}-SageMakerExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - sagemaker.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSageMakerFullAccess'
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
        - 'arn:aws:iam::aws:policy/AmazonAthenaFullAccess'
        - 'arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess'
      Policies:
        - PolicyName: !Sub '${ProjectName}-MLflowAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sagemaker:CreateMlflowTrackingServer'
                  - 'sagemaker:UpdateMlflowTrackingServer'
                  - 'sagemaker:DeleteMlflowTrackingServer'
                  - 'sagemaker:DescribeMlflowTrackingServer'
                  - 'sagemaker:ListMlflowTrackingServers'
                Resource: '*'
        - PolicyName: !Sub '${ProjectName}-EventBridgeAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:PutRule'
                  - 'events:PutTargets'
                  - 'events:DeleteRule'
                  - 'events:RemoveTargets'
                  - 'events:DescribeRule'
                Resource: '*'
        - PolicyName: !Sub '${ProjectName}-IAMPassRole'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/*'
                Condition:
                  StringEquals:
                    'iam:PassedToService': 'sagemaker.amazonaws.com'
        - PolicyName: !Sub '${ProjectName}-SageMakerImageAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sagemaker:DescribeImageVersion'
                  - 'sagemaker:DescribeImage'
                  - 'sagemaker:ListImageVersions'
                  - 'sagemaker:DescribeApp'
                  - 'sagemaker:DescribeSpace'
                  - 'sagemaker:DescribeDomain'
                  - 'sagemaker:DescribeUserProfile'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ecr:GetAuthorizationToken'
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'ecr:DescribeImages'
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-execution-role'

  # ====================================================================
  # SageMaker Domain (VpcOnly with public subnets - No NAT Gateway!)
  # ====================================================================
  SageMakerDomain:
    Type: AWS::SageMaker::Domain
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DomainName: !Sub '${ProjectName}-domain'
      AuthMode: IAM
      DefaultUserSettings:
        ExecutionRole: !If
          - CreateNewRole
          - !GetAtt SageMakerExecutionRole.Arn
          - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
        SecurityGroups:
          - !If
            - CreateNewSecurityGroup
            - !Ref SecurityGroup
            - !Ref ExistingSecurityGroupId
      AppNetworkAccessType: VpcOnly
      VpcId: !If
        - CreateNewVPC
        - !Ref VPC
        - !Ref ExistingVPCId
      SubnetIds:
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet1
          - !Ref ExistingSubnet1Id
        - !If
          - CreateNewVPC
          - !Ref PublicSubnet2
          - !Ref ExistingSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-domain'

  # ====================================================================
  # User Profile
  # ====================================================================
  UserProfile:
    Type: AWS::SageMaker::UserProfile
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn: SpaceLifecycleConfig
    Properties:
      DomainId: !Ref SageMakerDomain
      UserProfileName: !Ref UserProfileName
      UserSettings:
        ExecutionRole: !If
          - CreateNewRole
          - !GetAtt SageMakerExecutionRole.Arn
          - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
        JupyterLabAppSettings:
          LifecycleConfigArns:
            - !GetAtt SpaceLifecycleConfig.StudioLifecycleConfigArn
          DefaultResourceSpec:
            InstanceType: !Ref JupyterLabInstance
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-user-profile'

  # ====================================================================
  # Lifecycle Configuration
  # ====================================================================
  SpaceLifecycleConfig:
    Type: AWS::SageMaker::StudioLifecycleConfig
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      StudioLifecycleConfigName: !Sub '${ProjectName}-setup-script'
      StudioLifecycleConfigAppType: JupyterLab
      StudioLifecycleConfigContent:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -e

            # Wait for Jupyter to be fully ready
            sleep 10

            # Set up environment as the default notebook user
            WORK_DIR="/home/sagemaker-user"
            cd "$WORK_DIR"

            # Clone repository if not already present
            if [ ! -d "sample-mlops-bestpractices" ]; then
              echo "Cloning repository..."
              git clone ${GitHubRepo}
            fi

            # Navigate to project directory
            cd sample-mlops-bestpractices/sagemaker-automated-drift-and-trend-monitoring

            # Create .env file with CloudFormation outputs
            echo "Creating .env file with CloudFormation outputs..."
            cat > .env << 'EOF'
            # AWS Configuration
            AWS_DEFAULT_REGION=${AWS::Region}

            # SageMaker Configuration
            SAGEMAKER_EXEC_ROLE=arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole
            SAGEMAKER_DOMAIN_ID=${SageMakerDomain}

            # MLflow Configuration
            MLFLOW_TRACKING_URI=${MLflowTrackingServer.TrackingServerArn}

            # S3 Configuration
            DATA_S3_BUCKET=${ProjectName}-data-${AWS::AccountId}

            # Project Configuration
            PROJECT_NAME=${ProjectName}
            EOF

            # Set proper ownership
            chown sagemaker-user:sagemaker-user .env
            chmod 600 .env

            # Create README with setup instructions
            cat > CLOUDFORMATION_SETUP_COMPLETE.md << 'SETUPEOF'
            # CloudFormation Setup Complete!

            ## Environment Variables Configured

            Your .env file has been automatically created with all necessary configurations:
            - AWS Region and SageMaker Execution Role
            - MLflow Tracking Server URL
            - S3 Data Bucket

            ## Next Steps

            1. Open a terminal and verify the environment:
               ```bash
               cat .env
               ```

            2. Install dependencies:
               ```bash
               pip install -r requirements.txt
               ```

            3. Run the notebooks in order:
               - 01_data_preparation.ipynb
               - 02_model_training.ipynb
               - 03_inference_monitoring.ipynb

            ## MLflow Tracking Server

            Your MLflow tracking server ARN:
            ${MLflowTrackingServer.TrackingServerArn}

            To get the MLflow UI URL, run:
            aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query 'TrackingServerUrl' --output text

            SETUPEOF

            chown sagemaker-user:sagemaker-user CLOUDFORMATION_SETUP_COMPLETE.md

            echo "Setup complete! Check CLOUDFORMATION_SETUP_COMPLETE.md for next steps."
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-lifecycle-config'

  # ====================================================================
  # JupyterLab Space
  # ====================================================================
  JupyterSpace:
    Type: AWS::SageMaker::Space
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn:
      - UserProfile
      - MLflowTrackingServer
      - SpaceLifecycleConfig
    Properties:
      DomainId: !Ref SageMakerDomain
      SpaceName: !Sub '${ProjectName}-jupyter-space-v2'
      OwnershipSettings:
        OwnerUserProfileName: !Ref UserProfileName
      SpaceSettings:
        AppType: JupyterLab
        JupyterLabAppSettings:
          DefaultResourceSpec:
            InstanceType: !Ref JupyterLabInstance
            LifecycleConfigArn: !GetAtt SpaceLifecycleConfig.StudioLifecycleConfigArn
      SpaceSharingSettings:
        SharingType: Private
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-jupyter-space'
        - Key: ManagedBy
          Value: CloudFormation

  # ====================================================================
  # MLflow Tracking Server
  # ====================================================================
  MLflowTrackingServer:
    Type: AWS::SageMaker::MlflowTrackingServer
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TrackingServerName: !Sub '${ProjectName}-mlflow'
      ArtifactStoreUri: !Sub 's3://${ProjectName}-data-${AWS::AccountId}/mlflow-artifacts'
      RoleArn: !If
        - CreateNewRole
        - !GetAtt SageMakerExecutionRole.Arn
        - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
      AutomaticModelRegistration: true
      WeeklyMaintenanceWindowStart: 'Sun:03:00'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-mlflow'

Outputs:
  SageMakerDomainId:
    Description: SageMaker Domain ID
    Value: !Ref SageMakerDomain
    Export:
      Name: !Sub '${AWS::StackName}-DomainId'

  UserProfileName:
    Description: SageMaker User Profile Name
    Value: !Ref UserProfileName
    Export:
      Name: !Sub '${AWS::StackName}-UserProfileName'

  JupyterSpaceName:
    Description: JupyterLab Space Name
    Value: !Sub '${ProjectName}-jupyter-space'
    Export:
      Name: !Sub '${AWS::StackName}-JupyterSpaceName'

  DataBucketName:
    Description: S3 Data Bucket Name
    Value: !If [CreateNewBucket, !Ref DataBucket, !Sub '${ProjectName}-data-${AWS::AccountId}']
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  SageMakerExecutionRoleArn:
    Description: SageMaker Execution Role ARN
    Value: !If
      - CreateNewRole
      - !GetAtt SageMakerExecutionRole.Arn
      - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-SageMakerExecutionRole'
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'

  MLflowTrackingServerArn:
    Description: MLflow Tracking Server ARN
    Value: !GetAtt MLflowTrackingServer.TrackingServerArn
    Export:
      Name: !Sub '${AWS::StackName}-MLflowArn'

  MLflowTrackingServerName:
    Description: MLflow Tracking Server Name (use with describe-mlflow-tracking-server to get URL)
    Value: !Sub '${ProjectName}-mlflow'
    Export:
      Name: !Sub '${AWS::StackName}-MLflowName'

  GetMLflowUrlCommand:
    Description: Command to get MLflow UI URL
    Value: !Sub 'aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query TrackingServerUrl --output text --region ${AWS::Region}'

  SetupInstructions:
    Description: Setup Instructions
    Value: !Sub |
      Stack created successfully!

      1. Navigate to SageMaker Console: https://console.aws.amazon.com/sagemaker/home?region=${AWS::Region}#/domains
      2. Click on Domain: ${ProjectName}-domain
      3. Select User Profile: ${UserProfileName}
      4. Go to Spaces and open: ${ProjectName}-jupyter-space
      5. Click "Run Space" to start JupyterLab
      6. Once JupyterLab loads, check CLOUDFORMATION_SETUP_COMPLETE.md for next steps

      Get MLflow UI URL:
      aws sagemaker describe-mlflow-tracking-server --tracking-server-name ${ProjectName}-mlflow --query TrackingServerUrl --output text --region ${AWS::Region}
